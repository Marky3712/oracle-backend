name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render server
        run: |
          echo "Pinging at $(date)"
          curl -s -o /dev/null -w "%{http_code}\n" https://oracle-backend-fovh.onrender.com/api/health
